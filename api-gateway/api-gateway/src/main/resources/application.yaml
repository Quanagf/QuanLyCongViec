spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: task-service
          uri: http://task-service:8081
          predicates:
            - Path=/api/tasks/**
          filters:
            - RewritePath=/api/tasks/(?<path>.*), /tasks/$\{path}
        - id: user-service
          uri: http://user-service:8082
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users/(?<path>.*), /users/$\{path}

server:
  port: 8080
